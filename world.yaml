precedence: [LSFT, LALT, RALT, LCTL, RCTL, RSFT, LCTL_RSFT, RCTL_RSFT] # latter overrides former: RCTL_RSFT overrides all

transforms:
  A: { base: ogonek }
  C: { base: acute }
  E: { base: ogonek }
  L: { base: slash }
  N: { base: acute }
  O: { base: acute }
  S: { base: acute }
  Z: { base: dot, RALT: acute, LALT: acute, LCTL: acute, RCTL: acute }
  X: { base: acute } # Często używane jako alternatywa dla 'ź'
  consonants:
     { base: cedilla, LCTL: eszett,    RCTL: ntilde,     RSFT: micro                                                                         }
  quotes_left:
     { base: angle,   LCTL: curly,     RCTL: low,        RSFT: grave,   LALT: corner1, RALT: corner2, LCTL_RSFT: corner1, RCTL_RSFT: corner2 }
  quotes_right:
     { base: angle,   LCTL: curly,     RCTL: low,        RSFT: grave,   LALT: corner1, RALT: corner2, LCTL_RSFT: corner1, RCTL_RSFT: corner2 }
  currency:
     { base: dollar,  LCTL: euro,      RCTL: pound,      RSFT: generic, LALT: yen,     RALT: won,     LCTL_RSFT: yen    , RCTL_RSFT: won     }
  sign:
    base: copyright
    LCTL: trademark

characters:
  A:
    ogonek: { lower: "ą",  upper: "Ą" }
  C:
    acute:  { lower: "ć",  upper: "Ć" }
  E:
    ogonek: { lower: "ę",  upper: "Ę" }
  L:
    slash:  { lower: "ł",  upper: "Ł" }
  N:
    acute:  { lower: "ń",  upper: "Ń" }
  O:
    acute:  { lower: "ó",  upper: "Ó" }
  S:
    acute:  { lower: "ś",  upper: "Ś" }
  Z:
    dot:    { lower: "ż",  upper: "Ż" }
    acute:  { lower: "ź",  upper: "Ź" }
  X:
    acute:  { lower: "ź",  upper: "Ź" }

  consonants:
    cedilla:    { lower: "ç",  upper: "Ç"  }
    eszett:     { lower: "ß",  upper: "ẞ"  }
    ntilde:     { lower: "ñ",  upper: "Ñ"  }
    micro:               "µ"
  quotes_left:
    angle:      { lower: "‹",  upper: "«"  }
    curly:      { lower: "‘",  upper: "“"  }
    low:        { lower: "‚",  upper: "„"  }
    corner1:    { lower: "「", upper: "﹁" }
    corner2:    { lower: "『", upper: "﹃" }
    grave:               "`"
  quotes_right:
    angle:      { lower: "›",  upper: "»"  }
    curly:      { lower: "’",  upper: "”"  }
    low:        { lower: "‚",  upper: "„"  }
    corner1:    { lower: "」", upper: "﹂" }
    corner2:    { lower: "』", upper: "﹄" }
    grave:               "´"
  currency:
    dollar:     { lower: "$",  upper: "¢"  }
    yen:                 "¥"
    euro:                "€"
    won:                 "₩"
    pound:               "£"
    generic:    { lower: "¤",  upper: "₿"  }
  sign:
    copyright: { regular: "©", shifted: "®" }
    trademark: { regular: "™", shifted: "℠" }
    landmark:  { section: "§", pilcrow: "¶" }
    exclaim:   { left:    "¡", right:   "!" }
    question:  { left:    "¿", right:   "?" }
    ordinal:   { o:       "º", a:       "ª" }
    angle:     { degree:  "°", pi:      "π" }
    dash:      { endash:  "–", emdash:  "—" }

codepoints:
  currency_crypto: "₿"
  currency_cent:   "¢"
  currency_sign:   "¤"

compositions: {}
